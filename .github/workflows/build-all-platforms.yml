name: Build All Platforms

on:
  workflow_dispatch:
    inputs:
      build_android:
        description: 'Build Android'
        required: true
        type: boolean
        default: true
      build_ios:
        description: 'Build iOS'
        required: true
        type: boolean
        default: true
      create_release:
        description: 'Create a GitHub Release'
        required: false
        type: boolean
        default: false
      bump:
        description: 'Version component to bump (patch / minor / major)'
        required: false
        type: choice
        default: patch
        options:
          - patch
          - minor
          - major
  workflow_call:
    inputs:
      build_android:
        required: false
        type: boolean
        default: true
      build_ios:
        required: false
        type: boolean
        default: true
      create_release:
        required: false
        type: boolean
        default: false
      bump:
        required: false
        type: string
        default: patch
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-android:
    if: ${{ github.event_name == 'push' || inputs.build_android }}
    outputs:
      apk_signed: ${{ steps.check-signing.outputs.apk_signed }}
    runs-on: ubuntu-latest
    env:
      HAS_ANDROID_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      CAPACITOR_SERVER_URL: "https://biblia.capuchinhos.org/"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install dependencies
        run: npm ci

      # The native apps are intentional PWA wrappers: web content is served
      # remotely via server.url in capacitor.config.ts (Vercel-hosted PWA).
      # An empty webDir is required by Capacitor but no local assets are bundled.
      - name: Create empty web directory for Capacitor
        # The native app is a PWA wrapper: capacitor.config.ts sets server.url to the hosted
        # Vercel deployment, so no bundled web assets are needed. An empty webDir is required
        # only to satisfy Capacitor's directory validation during `cap sync`.
        run: mkdir -p dist/bible-app/browser

      - name: Setup Capacitor Android
        run: |
          set -e
          npx cap add android
          npx cap sync android
          npx @capacitor/assets generate --android

      - name: Set Android Version
        run: |
          set -e
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == refs/tags/v* ]]; then
            TAG_NAME="${{ github.ref_name }}"
          else
            LATEST=$(git tag --list 'v*' | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -1)
            LATEST=${LATEST:-v0.0.0}
            VERSION=${LATEST#v}
            MAJOR=$(echo "$VERSION" | cut -d. -f1)
            MINOR=$(echo "$VERSION" | cut -d. -f2)
            PATCH=$(echo "$VERSION" | cut -d. -f3)
            
            if [[ "${{ inputs.create_release }}" == "true" ]]; then
              BUMP="${{ inputs.bump }}"
              case "$BUMP" in
                major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
                minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
                *)     PATCH=$((PATCH + 1)) ;;
              esac
            fi
            TAG_NAME="v${MAJOR}.${MINOR}.${PATCH}"
          fi
          
          VERSION_NAME=${TAG_NAME#v}
          MAJOR=$(echo "$VERSION_NAME" | cut -d. -f1)
          MINOR=$(echo "$VERSION_NAME" | cut -d. -f2)
          PATCH=$(echo "$VERSION_NAME" | cut -d. -f3)
          # Format: 1.2.3 -> 1002003
          VERSION_CODE=$(( MAJOR * 1000000 + MINOR * 1000 + PATCH ))
          
          echo "Setting versionName=$VERSION_NAME and versionCode=$VERSION_CODE"
          
          # Replace the default capacitor version inside android/app/build.gradle
          sed -i "s/versionCode 1/versionCode $VERSION_CODE/g" android/app/build.gradle
          sed -i "s/versionName \"1.0\"/versionName \"$VERSION_NAME\"/g" android/app/build.gradle

      - name: Decode Keystore
        if: ${{ env.HAS_ANDROID_KEYSTORE != '' }}
        run: |
          set -e
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/release-key.jks

      - name: Create keystore.properties
        if: ${{ env.HAS_ANDROID_KEYSTORE != '' }}
        run: |
          set -e
          cat > android/keystore.properties << EOF
          storeFile=release-key.jks
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF

      - name: Configure Gradle signing
        if: ${{ env.HAS_ANDROID_KEYSTORE != '' }}
        run: |
          set -e
          # Inject signing config into app/build.gradle
          sed -i '/android {/a \
              signingConfigs {\
                  release {\
                      def keystorePropertiesFile = rootProject.file("keystore.properties")\
                      def keystoreProperties = new Properties()\
                      keystoreProperties.load(new FileInputStream(keystorePropertiesFile))\
                      storeFile file(keystoreProperties["storeFile"])\
                      storePassword keystoreProperties["storePassword"]\
                      keyAlias keystoreProperties["keyAlias"]\
                      keyPassword keystoreProperties["keyPassword"]\
                  }\
              }' android/app/build.gradle
          # Update release buildType to use signing config
          sed -i 's/buildTypes {/buildTypes {\n        release {\n            signingConfig signingConfigs.release\n        }/' android/app/build.gradle

      - name: Build Android APK
        run: |
          set -e
          cd android
          if [ -n "${HAS_ANDROID_KEYSTORE}" ]; then
            echo "Building Release APK..."
            ./gradlew assembleRelease
          else
            echo "Building Debug APK (no keystore provided)..."
            ./gradlew assembleDebug
          fi

      - name: Set signing output
        id: check-signing
        run: |
          if [ -n "${HAS_ANDROID_KEYSTORE}" ]; then
            echo "apk_signed=true" >> "$GITHUB_OUTPUT"
          else
            echo "apk_signed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: android/app/build/outputs/apk/**/*.apk
          retention-days: 30

      - name: Build Android AAB
        run: |
          set -e
          cd android
          if [ -n "${HAS_ANDROID_KEYSTORE}" ]; then
            echo "Building Release AAB..."
            ./gradlew bundleRelease
          else
            echo "Building Debug AAB (no keystore provided)..."
            ./gradlew bundleDebug
          fi

      - name: Upload Android AAB
        uses: actions/upload-artifact@v4
        with:
          name: android-aab
          path: android/app/build/outputs/bundle/**/*.aab
          retention-days: 30

  build-ios-macos:
    if: ${{ github.event_name == 'push' || inputs.build_ios }}
    runs-on: macos-latest
    env:
      HAS_IOS_CERTIFICATE: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
      CAPACITOR_SERVER_URL: "https://biblia.capuchinhos.org/"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # The native apps are intentional PWA wrappers: web content is served
      # remotely via server.url in capacitor.config.ts (Vercel-hosted PWA).
      # An empty webDir is required by Capacitor but no local assets are bundled.
      - name: Create empty web directory for Capacitor
        # The native app is a PWA wrapper: capacitor.config.ts sets server.url to the hosted
        # Vercel deployment, so no bundled web assets are needed. An empty webDir is required
        # only to satisfy Capacitor's directory validation during `cap sync`.
        run: mkdir -p dist/bible-app/browser

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Setup Capacitor iOS
        run: |
          set -e
          npx cap add ios
          npx cap sync ios
          npx @capacitor/assets generate --ios
          echo "Listing ios/App contents:"
          ls -R ios/App
          echo "Listing available destinations:"
          xcodebuild -project ios/App/App.xcodeproj -scheme App -showdestinations || true

      - name: Install Apple Certificate and Provisioning Profile
        if: ${{ env.HAS_IOS_CERTIFICATE != '' }}
        run: |
          set -e
          # Create temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Import certificate
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          echo "${{ secrets.IOS_CERTIFICATE_BASE64 }}" | base64 -d > $CERTIFICATE_PATH
          security import $CERTIFICATE_PATH -P "${{ secrets.IOS_CERTIFICATE_PASSWORD }}" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          # Install provisioning profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}" | base64 -d > ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision

      - name: Build iOS app (Signed)
        if: ${{ env.HAS_IOS_CERTIFICATE != '' }}
        run: |
          set -e
          cd ios/App
          xcodebuild -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath ./build/iOS.xcarchive \
            archive

      - name: Export signed IPA
        if: ${{ env.HAS_IOS_CERTIFICATE != '' }}
        run: |
          set -e
          cd ios/App
          cat > ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string>
              <key>teamID</key>
              <string>${{ secrets.IOS_TEAM_ID }}</string>
          </dict>
          </plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath ./build/iOS.xcarchive \
            -exportPath ./build/output \
            -exportOptionsPlist ExportOptions.plist

      - name: Build iOS app (Unsigned)
        if: ${{ env.HAS_IOS_CERTIFICATE == '' }}

        run: |
          set -e
          cd ios/App
          xcodebuild -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -archivePath ./build/iOS.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-app
          path: |
            ios/App/build/output/*.ipa
            ios/App/build/iOS.xcarchive
          retention-days: 30

      - name: Clean up keychain
        if: always()
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          if [ -f "$KEYCHAIN_PATH" ]; then
            security delete-keychain $KEYCHAIN_PATH
          fi

  create-tag:
    name: Create Git Tag
    # Only run on manual dispatch when create_release is true
    if: |
      github.event_name == 'workflow_dispatch' &&
      inputs.create_release == true
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.tag.outputs.tag_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calculate next version and push tag
        id: tag
        run: |
          set -e

          # Find the latest semver tag (vX.Y.Z); fall back to v0.0.0 if none exists
          LATEST=$(git tag --list 'v*' | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -1)
          LATEST=${LATEST:-v0.0.0}
          echo "Latest tag: $LATEST"

          # Strip the leading 'v'
          VERSION=${LATEST#v}
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)

          BUMP="${{ inputs.bump }}"
          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            *)     PATCH=$((PATCH + 1)) ;;
          esac

          TAG="v${MAJOR}.${MINOR}.${PATCH}"
          echo "New tag: $TAG"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$TAG" -m "Release $TAG"
          git push origin "$TAG"
          echo "tag_name=$TAG" >> "$GITHUB_OUTPUT"

  create-release:
    name: Create GitHub Release
    needs: [build-android, create-tag]
    # Run on version tag pushes OR on manual dispatch when create_release is enabled
    if: |
      always() &&
      needs.build-android.result == 'success' &&
      needs.build-android.outputs.apk_signed == 'true' &&
      (
        (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
        (github.event_name == 'workflow_dispatch' && inputs.create_release == true && needs.create-tag.result == 'success')
      )
    runs-on: ubuntu-latest
    steps:
      - name: Download Android APK artifact
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: release-assets

      - name: List downloaded assets
        run: find release-assets -type f

      - name: Resolve tag name
        id: resolve-tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag_name=${{ needs.create-tag.outputs.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag_name=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.resolve-tag.outputs.tag_name }}
          name: "Release ${{ steps.resolve-tag.outputs.tag_name }}"
          draft: false
          prerelease: ${{ contains(steps.resolve-tag.outputs.tag_name, '-') }}
          generate_release_notes: true
          files: release-assets/**/*.apk

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install zsp
        run: go install github.com/zapstore/zsp@latest

      - name: Publish to Zapstore
        env:
          SIGN_WITH: ${{ secrets.ZAPSTORE_NSEC }}
        run: |
          APK_PATH=$(find release-assets -type f -name "*.apk" | head -n 1)
          if [ -n "$APK_PATH" ]; then
            zsp publish -q "$APK_PATH" -r "https://github.com/${{ github.repository }}"
          else
            echo "No APK found to publish."
            exit 1
          fi
