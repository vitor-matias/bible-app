<div class="auto-scroll-controls">
  <button class="position-relative floating-nav-button auto-scroll-toggle" type="button" mat-mini-fab
    [attr.aria-label]="autoScrollEnabled ? 'Pausar deslocamento automático' : 'Ativar deslocamento automático'"
    [attr.aria-pressed]="autoScrollEnabled" (click)="toggleAutoScroll()">
    <mat-icon>{{ autoScrollEnabled ? 'pause' : 'play_arrow' }}</mat-icon>
  </button>
  <div class="auto-scroll-speed">
    <button type="button" mat-icon-button aria-label="Diminuir velocidade do deslocamento automático"
      [disabled]="autoScrollLinesPerSecond <= MIN_AUTO_SCROLL_LPS" (click)="decreaseAutoScrollSpeed()">
      <mat-icon>remove</mat-icon>
    </button>
    <span aria-live="polite">{{ autoScrollSpeedLabel }} ln/s</span>
    <button type="button" mat-icon-button aria-label="Aumentar velocidade do deslocamento automático"
      [disabled]="autoScrollLinesPerSecond >= MAX_AUTO_SCROLL_LPS" (click)="increaseAutoScrollSpeed()">
      <mat-icon>add</mat-icon>
    </button>
  </div>
</div>
