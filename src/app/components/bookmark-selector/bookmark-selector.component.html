<div class="bookmark-selector-container">
  <div class="header-row">
    <h3>Marcadores</h3>
    <button type="button" mat-icon-button (click)="toggleDeleteMode()" [class.delete-active]="isDeleteMode" aria-label="Alternar modo de eliminação" [attr.aria-pressed]="isDeleteMode">
      <mat-icon>delete</mat-icon>
    </button>
  </div>

  <div class="colors-grid">
    @for (ribbon of ribbons; track ribbon.value) {
    <div class="ribbon-item">
      <button type="button" class="color-button" [style.background-color]="ribbon.value"
        (click)="handleRibbonClick(ribbon)" [attr.aria-label]="ribbon.name">
        @if (ribbon.currentRef) {
        <span class="ribbon-text">{{ ribbon.currentRef }}</span>
        } @else {
        <mat-icon class="add-icon">add</mat-icon>
        }
      </button>
    </div>
    }
  </div>
</div>
